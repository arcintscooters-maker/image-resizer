[build]
builder = "nixpacks"

[build.nixpacksPlan.phases.setup]
nixPkgs = ["python311", "python311Packages.pip"]

[build.nixpacksPlan.phases.install]
cmds = ["python3.11 -m pip install flask Pillow gunicorn"]

[deploy]
startCommand = "python3.11 -m gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120"
restartPolicyType = "on_failure"
